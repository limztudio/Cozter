name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      # Check out into a directory literally named "Cozter" so the package
      # imports as `Cozter` (tests do `from Cozter... import`, matching the
      # README's "run from the parent directory" instructions).
      - uses: actions/checkout@v4
        with:
          path: Cozter

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Cozter/requirements.txt

      - name: Install dependencies
        working-directory: Cozter
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        working-directory: Cozter
        run: ruff check .

      - name: Tests (unittest)
        run: PYTHONPATH="$PWD" python -m unittest discover -s Cozter/tests
