# Gradual mypy adoption.
#
# mypy is ENFORCED on every module except those grandfathered below.
# The per-module `ignore_errors` blocks list modules with pre-existing
# type debt (Optional narrowing, untyped third-party SDK surfaces) so CI
# stays green while still catching regressions in already-clean modules
# and any new file. Burn the list down over time: delete a block, fix the
# module's errors, and that module becomes enforced. `tests/` is excluded
# entirely (the suite runs separately; test monkeypatching trips benign
# assignment-type errors).
[mypy]
python_version = 3.11
ignore_missing_imports = True
exclude = (?x)(/tests/|^tests/)

# --- Chat-platform adapters: heavy interaction with untyped Telegram /
# Slack / Signal SDK objects (Message | None attribute access, etc.).
[mypy-Cozter.backends_bot.*]
ignore_errors = True

# --- Core modules with pre-existing Optional-narrowing debt.
[mypy-Cozter.agent]
ignore_errors = True

[mypy-Cozter.config]
ignore_errors = True

[mypy-Cozter.colony]
ignore_errors = True

[mypy-Cozter.compaction]
ignore_errors = True

[mypy-Cozter.session]
ignore_errors = True

[mypy-Cozter.utils]
ignore_errors = True

[mypy-Cozter.backends_agent.llama]
ignore_errors = True

[mypy-Cozter.agent_tools.base]
ignore_errors = True

[mypy-Cozter.agent_tools.builtin.web_fetch]
ignore_errors = True

[mypy-Cozter.agent_tools.builtin.grep]
ignore_errors = True

[mypy-Cozter.agent_tools.builtin.glob]
ignore_errors = True
