# mypy is ENFORCED on every module except the chat-platform adapters
# grandfathered below (they wrestle with untyped Telegram/Slack/Signal SDK
# objects). The core runtime, backends, and agent tools are all type-clean
# and checked; regressions in them or in any new file fail CI. To enforce
# the adapters too, type them and delete the block below. `tests/` is
# excluded entirely (the suite runs separately; test monkeypatching trips
# benign assignment-type errors).
[mypy]
python_version = 3.11
ignore_missing_imports = True
exclude = (?x)(/tests/|^tests/)

# --- Chat-platform adapters: heavy interaction with untyped Telegram /
# Slack / Signal SDK objects (Message | None attribute access, etc.).
# The only remaining grandfathered subpackage; everything else is enforced.
[mypy-Cozter.backends_bot.*]
ignore_errors = True
